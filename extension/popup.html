<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg-page: #f9f9f9;
        --bg-card: #fff;
        --bg-header: #2c3e50;
        --bg-header-btn: rgba(255, 255, 255, 0.1);
        --bg-header-btn-hover: rgba(255, 255, 255, 0.18);
        --bg-stats: #ecf0f1;
        --bg-search: #f3f6f8;
        --bg-hover: #f0f0f0;
        --bg-editor: #fafafa;
        --bg-word-hover: #f6f7f8;
        --text-primary: #333;
        --text-heading: #2d3436;
        --text-secondary: #566;
        --text-muted: #999;
        --text-stats: #7f8c8d;
        --border: #ddd;
        --border-input: #cfd8dc;
        --border-light: #eee;
        --border-word: #f0f0f0;
        --border-word-list: #e0e0e0;
        --border-editor: #bdc3c7;
        --border-header-btn: rgba(255, 255, 255, 0.35);
        --swatch-border: rgba(0, 0, 0, 0.25);
        --toggle-off: #ccc;
        --toggle-on: #27ae60;
        --accent: #3498db;
        --danger: #e74c3c;
        --danger-hover: #c0392b;
        --drag-handle: #bbb;
        --dialog-shadow: rgba(0, 0, 0, 0.2);
        --dialog-backdrop: rgba(0, 0, 0, 0.4);
        --dialog-text: #555;
        --dialog-cancel-bg: #f5f5f5;
        --dialog-border: #ccc;
        --hint-text: #6b7280;
        --banner-border: #ddd;
        --banner-select-border: #ccc;
        --save-btn-bg: #27ae60;
        --save-btn-border: #27ae60;
      }
      body {
        width: 360px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-page);
      }

      .header {
        padding: 12px;
        background: var(--bg-header);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .header h1 {
        font-size: 15px;
        font-weight: 650;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .top-btn {
        padding: 6px 10px;
        border: 1px solid var(--border-header-btn);
        border-radius: 8px;
        background: var(--bg-header-btn);
        color: #fff;
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }
      .top-btn:hover {
        background: var(--bg-header-btn-hover);
      }

      .toggle-switch {
        position: relative;
        width: 40px;
        height: 22px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--toggle-off);
        border-radius: 22px;
        transition: 0.2s;
      }
      .toggle-slider:before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 2px;
        bottom: 2px;
        background: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      .toggle-switch input:checked + .toggle-slider {
        background: var(--toggle-on);
      }
      .toggle-switch input:checked + .toggle-slider:before {
        transform: translateX(18px);
      }

      .stats {
        padding: 8px 12px;
        background: var(--bg-stats);
        font-size: 12px;
        color: var(--text-stats);
        border-bottom: 1px solid var(--border);
      }

      .search-bar {
        padding: 8px 12px;
        background: var(--bg-search);
        border-bottom: 1px solid var(--border);
      }
      .search-bar input {
        width: 100%;
        padding: 9px 10px;
        font-size: 14px;
        border: 1px solid var(--border-input);
        border-radius: 8px;
        background: var(--bg-card);
        color: var(--text-primary);
      }

      .cat-list {
        max-height: 520px;
        overflow-y: auto;
        background: var(--bg-card);
      }

      .cat-item {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-light);
        gap: 10px;
        cursor: pointer;
        background: var(--bg-card);
        user-select: none;
      }
      .cat-item:hover {
        background: var(--bg-hover);
      }
      .cat-item.dragging {
        opacity: 0.5;
      }
      .cat-item.drag-over {
        border-top: 2px solid var(--accent);
      }

      /* Rounded square swatch */
      .cat-accent {
        display: inline-block;
        width: 20px;
        height: 20px;
        border-radius: 7px;
        flex-shrink: 0;
        border: 1px solid var(--swatch-border);
      }

      .cat-grip {
        color: var(--drag-handle);
        font-size: 15px;
        cursor: grab;
        user-select: none;
      }

      .cat-color-input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .cat-name {
        flex: 1;
        font-size: 14px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-heading);
      }

      .cat-count {
        font-size: 11px;
        color: var(--text-muted);
        flex-shrink: 0;
        min-width: 30px;
        text-align: right;
      }

      .cat-toggle {
        flex-shrink: 0;
      }

      .cat-editor {
        border-bottom: 1px solid var(--border-light);
        padding: 10px 12px 12px 12px;
        background: var(--bg-editor);
        display: none;
      }
      .cat-editor.open {
        display: block;
      }

      .cat-editor .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .cat-editor input[type="text"] {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid var(--border-input);
        border-radius: 8px;
        font-size: 13px;
        background: var(--bg-card);
        color: var(--text-primary);
      }

      .cat-editor button {
        padding: 8px 10px;
        border: 1px solid var(--border-editor);
        border-radius: 8px;
        background: var(--bg-card);
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }
      .cat-editor button:hover {
        background: var(--bg-stats);
      }

      .flags {
        display: flex;
        gap: 10px;
        align-items: center;
        font-size: 13px;
        color: var(--text-secondary);
        user-select: none;
      }
      .flags label {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        cursor: pointer;
      }

      .word-list {
        margin-top: 10px;
        border: 1px solid var(--border-word-list);
        background: var(--bg-card);
        border-radius: 10px;
        overflow: hidden;
        max-height: 220px;
        overflow-y: auto;
      }

      /* Click-to-remove rows */
      .word-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border-word);
        font-size: 13px;
        cursor: pointer;
      }
      .word-row:last-child {
        border-bottom: none;
      }
      .word-row:hover {
        background: var(--bg-word-hover);
      }

      .word-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-heading);
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: var(--hint-text);
      }

      .client-banner {
        padding: 8px 12px;
        font-size: 13px;
        border-bottom: 1px solid var(--banner-border);
      }
      .client-banner select {
        padding: 4px 6px;
        border: 1px solid var(--banner-select-border);
        border-radius: 6px;
        font-size: 12px;
        max-width: 140px;
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .client-banner .save-btn {
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--save-btn-border);
        background: var(--save-btn-bg);
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
      }
      .banner-client-name {
        font-weight: 600;
        flex: 1;
        min-width: 80px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Accessible confirm dialog */
      #confirmDialog {
        border: none;
        border-radius: 10px;
        padding: 20px;
        max-width: 320px;
        box-shadow: 0 8px 30px var(--dialog-shadow);
        font-family: inherit;
        background: var(--bg-card);
        color: var(--text-primary);
      }
      #confirmDialog::backdrop {
        background: var(--dialog-backdrop);
      }
      #confirmDialog h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      #confirmDialog p {
        margin: 0 0 14px;
        font-size: 12px;
        color: var(--dialog-text);
        word-break: break-word;
      }
      .dialog-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }
      .dialog-buttons button {
        padding: 5px 14px;
        border-radius: 6px;
        border: 1px solid var(--dialog-border);
        cursor: pointer;
        font-size: 12px;
      }
      .btn-dialog-cancel {
        background: var(--dialog-cancel-bg);
        color: var(--text-primary);
      }
      .btn-dialog-danger {
        background: var(--danger);
        color: #fff;
        border-color: var(--danger-hover);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-page: #1a1a2e;
          --bg-card: #16213e;
          --bg-header: #0f1a2e;
          --bg-header-btn: rgba(255, 255, 255, 0.08);
          --bg-header-btn-hover: rgba(255, 255, 255, 0.15);
          --bg-stats: #1e2a45;
          --bg-search: #182438;
          --bg-hover: #223050;
          --bg-editor: #1a2540;
          --bg-word-hover: #1e2d48;
          --text-primary: #e0e0e0;
          --text-heading: #e0e0e0;
          --text-secondary: #a0a0a0;
          --text-muted: #808080;
          --text-stats: #808080;
          --border: #2a2a4a;
          --border-input: #3a3a5a;
          --border-light: #252545;
          --border-word: #252545;
          --border-word-list: #2a2a4a;
          --border-editor: #3a3a5a;
          --border-header-btn: rgba(255, 255, 255, 0.25);
          --swatch-border: rgba(255, 255, 255, 0.25);
          --toggle-off: #555;
          --toggle-on: #27ae60;
          --accent: #5dade2;
          --danger: #e74c3c;
          --danger-hover: #c0392b;
          --drag-handle: #606060;
          --dialog-shadow: rgba(0, 0, 0, 0.5);
          --dialog-backdrop: rgba(0, 0, 0, 0.6);
          --dialog-text: #b0b0b0;
          --dialog-cancel-bg: #252545;
          --dialog-border: #3a3a5a;
          --hint-text: #808080;
          --banner-border: #2a2a4a;
          --banner-select-border: #3a3a5a;
          --save-btn-bg: #27ae60;
          --save-btn-border: #27ae60;
        }
      }
    </style>
  </head>
  <body>
    <dialog id="confirmDialog" role="alertdialog" aria-labelledby="confirmTitle" aria-describedby="confirmBody">
      <h3 id="confirmTitle"></h3>
      <p id="confirmBody"></p>
      <div class="dialog-buttons">
        <button id="confirmCancel" class="btn-dialog-cancel">Cancel</button>
        <button id="confirmOk" class="btn-dialog-danger">Remove</button>
      </div>
    </dialog>

    <div class="header">
      <h1>CMS Highlighter</h1>

      <div class="header-right">
        <button id="btnOptions" class="top-btn" title="Open full dictionary editor">Options</button>

        <label class="toggle-switch" title="Master on/off">
          <input type="checkbox" id="masterToggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="stats" id="stats" role="status" aria-live="polite">Loading...</div>

    <!-- Client banner: shown when a CMS client name is detected -->
    <div id="clientBanner" class="client-banner" role="region" aria-label="Detected client" style="display: none">
      <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap">
        <span id="bannerClientName" class="banner-client-name"></span>
        <select id="bannerCatSelect" title="Default client category"></select>
        <button id="bannerAddBtn" class="save-btn" style="display: none">Save</button>
      </div>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="popupSearch"
        placeholder="Search categories and words"
        aria-label="Search categories and words"
      />
    </div>

    <div class="cat-list" id="catList"></div>

    <script src="utils.js"></script>
    <script src="matcher-core.js"></script>
    <script src="popup-state.js"></script>
    <script src="popup-categories.js"></script>
    <script src="popup-init.js"></script>
  </body>
</html>
